# Replace YOUR_DOMAIN with your real hostname before installing this file.
# Provision the cert ONCE with certbot:
#   sudo apt-get install -y nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d YOUR_DOMAIN
# certbot will edit this file in place and add the SSL block. The
# template below is what the file should look like after that step,
# minus the certbot-managed lines.

# HTTP: serve ACME challenges and redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: terminate TLS, proxy to the Next.js app on loopback.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # Modern config — disables legacy protocols and ciphers.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Modest body size — the API doesn't accept file uploads.
    client_max_body_size 64k;

    # Defeat client-supplied "Forwarded" headers — nginx is the edge here, no
    # upstream load balancer feeds it.
    proxy_set_header Forwarded "";

    # Hide nginx version banner.
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
